name: Quarterly Data Pipeline

on:
  schedule:
    # Runs at midnight UTC on the 1st of January, April, July, October (every 3 months)
    - cron: "0 0 1 1,4,7,10 *"
  workflow_dispatch:
    # Allows manual trigger from GitHub UI

concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          echo "🧪 Running tests..."
          python -m pytest tests/ -v --tb=short

      - name: Run tests with coverage
        run: |
          echo "📊 Running tests with coverage..."
          python -m pytest tests/ --cov=src.config --cov=src.combine_csvs --cov=src.generate_titles_and_classify --cov=src.pipeline_runner --cov=utils.csv_handler --cov=utils.course_discovery --cov=utils.scraping_handler --cov=utils.repo_analyzer --cov=utils.openai_api --cov-report=term-missing --cov-fail-under=80

  update-data:
    runs-on: ubuntu-latest
    needs: test  # Only run if tests pass

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Discover available courses
        run: |
          echo "🔍 Discovering available courses..."
          python -m src.pipeline_runner --discover

      - name: Process new courses
        env:
          MY_GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          echo "🚀 Processing new courses only..."
          python -m src.pipeline_runner
          # Capture which courses were just created for targeted retries
          git ls-files --others --exclude-standard Data/ | grep 'data\.csv' | \
            sed 's|Data/||;s|/[^/]*$||' | sort -u > /tmp/new_courses.txt
          echo "New courses processed:"
          cat /tmp/new_courses.txt || echo "(none)"

      - name: Retry unknowns (pass 2)
        env:
          MY_GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          if [ ! -s /tmp/new_courses.txt ]; then
            echo "✓ No new courses to retry"
            exit 0
          fi
          echo "🔁 Pass 2 - retrying unknowns in new courses..."
          while IFS='/' read -r course year; do
            echo "  Retrying $course/$year..."
            python -m src.generate_titles_and_classify --course "$course" --year "$year"
          done < /tmp/new_courses.txt

      - name: Retry unknowns (pass 3)
        env:
          MY_GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          if [ ! -s /tmp/new_courses.txt ]; then
            echo "✓ No new courses to retry"
            exit 0
          fi
          echo "🔁 Pass 3 - retrying unknowns in new courses..."
          while IFS='/' read -r course year; do
            echo "  Retrying $course/$year..."
            python -m src.generate_titles_and_classify --course "$course" --year "$year"
          done < /tmp/new_courses.txt

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet Data/ && git ls-files --others --exclude-standard Data/ | grep -q .; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "📦 New untracked data files detected"
            git ls-files --others --exclude-standard Data/
          elif ! git diff --quiet Data/; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "📦 Modified data files detected"
            git diff --stat Data/
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "✓ No new data to commit"
          fi

      - name: Commit and push new data
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add Data/
          git commit -m "🔄 Auto-update: New course data [$(date +'%Y-%m-%d')]"
          git push
          echo "✅ New data committed! Streamlit will auto-redeploy."
